<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人生重开模拟器 - 摇滚不灭版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; background: transparent; }
        body { background: #050505; font-family: monospace, sans-serif; color: #b0b0b0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; line-height: 1.6; font-size: 14px; }
        h1 { font-size: 20px; color: #ffffff; text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
        .section-title { color: #ffffff; margin: 15px 0 5px 0; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 3px; }
        .sub-desc { color: #777777; font-size: 12px; margin-bottom: 10px; }
        .option-item { padding: 8px 0; cursor: pointer; border-bottom: 1px dashed #222; }
        .option-item.selected { color: #ffcc00; font-weight: bold; }
        .option-name { font-size: 14px; }
        .option-desc { color: #777777; font-size: 12px; }
        .attr-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dashed #222; }
        .attr-btn { color: #ffffff; border: none; padding: 0 15px; font-size: 18px; cursor: pointer; }
        .attr-val { font-weight: bold; color: #ffffff; }
        .text-btn { display: block; width: 100%; text-align: center; color: #ffffff; font-weight: bold; padding: 12px 0; border: 1px solid #444; margin-top: 20px; cursor: pointer; text-decoration: none; font-size: 14px; }
        .text-btn:hover { border-color: #ffcc00; color: #ffcc00; }
        .text-btn:disabled { color: #444444; border-color: #222222; cursor: not-allowed; }
        .status-bar { padding: 8px 0; border-bottom: 1px solid #333; margin-bottom: 15px; font-size: 13px; color: #ffffff; }
        .log-wrap { display: flex; flex-direction: column-reverse; }
        .log-item { padding: 6px 0; border-bottom: 1px dashed #151515; text-align: left; }
        .age-tag { color: #ffcc00; font-weight: bold; margin-right: 8px; }
        .achieve-list { margin-top: 10px; max-height: 260px; overflow-y: auto; }
        .achieve-item { padding: 4px 0; border-bottom: 1px dashed #222; font-size: 12px; }
        .achieve-item.unlocked { color: #ffcc00; }
        .achieve-item.hidden-lock { color: #444444; }
        .good { color: #44aa44; } 
        .bad { color: #aa4444; } 
        .funny { color: #dd8833; } 
        .special { color: #9955ff; font-weight: bold; }
        .disaster { color: #ff3333; font-weight: bold; background: #200000; padding: 2px 4px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <h1>人生重开模拟器</h1>

        <div id="startMenu">
            <div id="poolSection">
                <div class="section-title">◇ 每次随机5选3（背景与天赋混合池）</div>
                <div class="sub-desc" id="poolSelectHint">请选择 3 个作为你的开局词条 (0/3)</div>
                <div id="poolList"></div>
                <button class="text-btn" id="poolBtn" onclick="goToSetup()" disabled>确认组合，前往分配点数</button>
            </div>

            <div id="setupSection" class="hidden">
                <div class="section-title">◇ 自由属性分配</div>
                <div class="sub-desc">剩余可用属性点: <span id="ptsNum" style="color:#ffcc00; font-weight:bold;">20</span></div>
                <div class="attr-row"><span>颜值</span><div><button class="attr-btn" onclick="adj('f',-1)">-</button><span id="fVal" class="attr-val">0</span><button class="attr-btn" onclick="adj('f',1)">+</button></div></div>
                <div class="attr-row"><span>智力</span><div><button class="attr-btn" onclick="adj('i',-1)">-</button><span id="iVal" class="attr-val">0</span><button class="attr-btn" onclick="adj('i',1)">+</button></div></div>
                <div class="attr-row"><span>体质</span><div><button class="attr-btn" onclick="adj('h',-1)">-</button><span id="hVal" class="attr-val">0</span><button class="attr-btn" onclick="adj('h',1)">+</button></div></div>
                <div class="attr-row"><span>财富</span><div><button class="attr-btn" onclick="adj('m',-1)">-</button><span id="mVal" class="attr-val">0</span><button class="attr-btn" onclick="adj('m',1)">+</button></div></div>
                <button class="text-btn" id="startBtn" onclick="startGame()" disabled>请分配完所有点数</button>
            </div>

            <div class="section-title" style="margin-top:30px;">🏆 荣誉成就室</div>
            <div class="sub-desc">包含50个手写普通成就与20个绝密隐藏大成。</div>
            <div class="achieve-list" id="achieveList"></div>
        </div>

        <div id="gamePanel" class="hidden">
            <div class="status-bar">
                <span id="ageDisplay" style="color:#ffcc00; font-weight:bold;">0岁</span> | 
                💰<span id="mDisp">0</span> 🧠<span id="iDisp">0</span> 💪<span id="hDisp">0</span> 😊<span id="fDisp">0</span> | 性别: <span id="gDisp">-</span>
            </div>
            <div class="log-wrap" id="logWrap"></div>
            <button class="text-btn" id="nextBtn" onclick="nextYear()">下一年</button>
        </div>
    </div>

    <script>
        let P = { f: 0, i: 0, h: 0, m: 0 }, rem = 20, age = -1, gender = '随机';
        let selectedItems = [], currentBackground = null, isGameOver = false;
        let rockCount = 0; // 记录经历的摇滚大事件数量
        let maxStats = { f: 0, i: 0, h: 0, m: 0 };

        // 载入本地持久化成就
        let unlockedArr = JSON.parse(localStorage.getItem('re_rock_ach_v3') || "[]");

        // ======= 50个纯手写普通成就定义 =======
        const NORMAL_ACHIEVEMENTS = [
            { id: "N1", name: "一无所有", cond: "财富跌至 0 触发流浪生存结局", check: () => P.m <= 0 },
            { id: "N2", name: "高级动物", cond: "智力降低至 0 沦为精神病院水壶", check: () => P.i <= 0 },
            { id: "N3", name: "无地自容", cond: "颜值归零异变成生化杀伤兵器被逮捕", check: () => P.f <= 0 },
            { id: "N4", name: "脆弱肉身", cond: "体质归零引发大面积器官衰竭", check: () => P.h <= 0 },
            { id: "N5", name: "流浪神豪", cond: "财富归零且生前曾拥有过高额财富(>=8)", check: () => P.m <= 0 && maxStats.m >= 8 },
            { id: "N6", name: "新长征序曲", cond: "在一生中经历 3 次或以上的中国摇滚事件", check: () => rockCount >= 3 },
            { id: "N7", name: "向阳花", cond: "颜值曾达到 10 点以上", check: () => maxStats.f >= 10 },
            { id: "N8", name: "完美信仰", cond: "智力曾达到 10 点以上", check: () => maxStats.i >= 10 },
            { id: "N9", name: "铁骨铮铮", cond: "体质曾达到 10 点以上", check: () => maxStats.h >= 10 },
            { id: "N10", name: "大富大贵", cond: "财富曾达到 10 点以上", check: () => maxStats.m >= 10 },
            { id: "N11", name: "顺利启航", cond: "成功活过婴儿期(达到 4 岁)", check: () => age >= 4 },
            { id: "N12", name: "阳光少年", cond: "成功度过少儿期(达到 13 岁)", check: () => age >= 13 },
            { id: "N13", name: "热血青年", cond: "成功度过青春期(达到 19 岁)", check: () => age >= 19 },
            { id: "N14", name: "而立之年", cond: "年龄达到 30 岁", check: () => age >= 30 },
            { id: "N15", name: "不惑之年", cond: "年龄达到 40 岁", check: () => age >= 40 },
            { id: "N16", name: "知天命", cond: "年龄达到 50 岁", check: () => age >= 50 },
            { id: "N17", name: "花甲之年", cond: "成功活到老年期(达到 60 岁)", check: () => age >= 60 },
            { id: "N18", name: "古稀长者", cond: "年龄达到 70 岁", check: () => age >= 70 },
            { id: "N19", name: "耄耋老怪", cond: "年龄达到 80 岁", check: () => age >= 80 },
            { id: "N20", name: "长寿神话", cond: "活到 90 岁以上", check: () => age >= 90 },
            { id: "N21", name: "平庸一生", cond: "没有任何一项属性超过 5 岁数却到了 50 岁", check: () => age >= 50 && maxStats.f <= 5 && maxStats.i <= 5 && maxStats.h <= 5 && maxStats.m <= 5 },
            { id: "N22", name: "倾国倾城", cond: "颜值达到 12 点及以上", check: () => P.f >= 12 },
            { id: "N23", name: "爱因斯坦", cond: "智力达到 12 点及以上", check: () => P.i >= 12 },
            { id: "N24", name: "金刚之躯", cond: "体质达到 12 点及以上", check: () => P.h >= 12 },
            { id: "N25", name: "富可敌国", cond: "财富达到 12 点及以上", check: () => P.m >= 12 },
            { id: "N26", name: "穷困潦倒", cond: "在青年期时财富低于 0", check: () => age >= 19 && age <= 35 && P.m < 0 },
            { id: "N27", name: "病魔缠身", cond: "体质低于 -2 但还没死", check: () => P.h < -2 && !isGameOver },
            { id: "N28", name: "智障边缘", cond: "智力低于 -2 但还没死", check: () => P.i < -2 && !isGameOver },
            { id: "N29", name: "东施效颦", cond: "颜值低于 -2 但还没死", check: () => P.f < -2 && !isGameOver },
            { id: "N30", name: "债台高筑", cond: "财富低于 -2 但还没死", check: () => P.m < -2 && !isGameOver },
            { id: "N31", name: "小有名气", cond: "在游戏中经历 1 次摇滚大事件", check: () => rockCount >= 1 },
            { id: "N32", name: "摇滚先锋", cond: "在游戏中经历 2 次摇滚大事件", check: () => rockCount >= 2 },
            { id: "N33", name: "百折不挠", cond: "体质在低于1的状态下存活了 5 年", check: () => false }, // 特殊逻辑内部判定
            { id: "N34", name: "极端的头脑", cond: "智力极高(>=11)且体质极差(<=1)", check: () => P.i >= 11 && P.h <= 1 },
            { id: "N35", name: "花瓶乐手", cond: "颜值极高(>=11)且智力极低(<=1)", check: () => P.f >= 11 && P.i <= 1 },
            { id: "N36", name: "暴发户", cond: "财富极高(>=11)且智力极低(<=1)", check: () => P.m >= 11 && P.i <= 1 },
            { id: "N37", name: "四肢发达", cond: "体质极高(>=11)且智力极低(<=1)", check: () => P.h >= 11 && P.i <= 1 },
            { id: "N38", name: "全能型天才", cond: "所有属性同时大于或等于 6", check: () => P.f >= 6 && P.i >= 6 && P.h >= 6 && P.m >= 6 },
            { id: "N39", name: "极端的贫富差", cond: "曾拥有超过 8 点财富，随后跌至 -3 以下", check: () => maxStats.m >= 8 && P.m <= -3 },
            { id: "N40", name: "红磡常客", cond: "生命中触发了与红磡相关的摇滚大事件", check: () => false }, // 内部事件触发
            { id: "N41", name: "黑豹之友", cond: "生命中触发了与黑豹乐队相关的摇滚大事件", check: () => false },
            { id: "N42", name: "崔健门徒", cond: "生命中触发了与崔健相关的摇滚大事件", check: () => false },
            { id: "N43", name: "仙人指路", cond: "生命中触发了与窦唯相关的摇滚大事件", check: () => false },
            { id: "N44", name: "魔岩三杰忠粉", cond: "生命中触发了张楚、何勇或红磡复刻事件", check: () => false },
            { id: "N45", name: "世纪末的钟声", cond: "触发过《钟鼓楼》相关事件", check: () => false },
            { id: "N46", name: "荒漠绿洲", cond: "触发过《走出荒漠》或《太阳》事件", check: () => false },
            { id: "N47", name: "无罪快活", cond: "触发过《快活无罪》相关事件", check: () => false },
            { id: "N48", name: "梦回唐朝者", cond: "触发过《梦回唐朝》或《飞翔鸟》相关事件", check: () => false },
            { id: "N49", name: "彻底清醒", cond: "触发过《假行僧》或《花房姑娘》相关事件", check: () => false },
            { id: "N50", name: "摇滚不死", cond: "成功活到 80 岁以上且经历过摇滚大事件", check: () => age >= 80 && rockCount >= 1 }
        ];

        // ======= 20个手写隐藏成就（未解锁条件显示为 ???） =======
        const HIDDEN_ACHIEVEMENTS = [
            { id: "H1", name: "隐藏传说: 新长征路", cond: "完美避开赛博未来灾难并存活", check: () => false },
            { id: "H2", name: "隐藏传说: 黑豹狂吼", cond: "完美避开修仙时代天劫并存活", check: () => false },
            { id: "H3", name: "隐藏传说: 仙人骑车", cond: "在老年期完美触发窦唯骑车炸酱面剧情", check: () => false },
            { id: "H4", name: "隐藏传说: 红磡绝唱", cond: "触发红磡复刻全息演唱会并在台下喊爆嗓子", check: () => false },
            { id: "H5", name: "隐藏传说: 一块红布", cond: "触发红布蒙眼吹小号大叔事件并获得金币", check: () => false },
            { id: "H6", name: "隐藏传说: 魔岩三杰", cond: "在青春期高强度集齐红磡与经典摇滚回响", check: () => false },
            { id: "H7", name: "隐藏传说: 孤独人无耻", cond: "在青年期失业阶段触发《孤独的人是可耻的》", check: () => false },
            { id: "H8", name: "隐藏传说: 高级动物", cond: "在中年危机时用保温杯泡枸杞听何勇", check: () => false },
            { id: "H9", name: "隐藏传说: 无地自容", cond: "抓周时精准抓中黑豹乐队黑胶唱片", check: () => false },
            { id: "H10", name: "隐藏传说: 快活无罪", cond: "在10岁以前由于英年早逝意外夭折", check: () => false },
            { id: "H11", name: "隐藏传说: 梦回唐朝", cond: "破解学校广播站全校外放唐朝乐队震撼全场", check: () => false },
            { id: "H12", name: "隐藏传说: 飞翔鸟", cond: "在公园高唱《飞翔鸟》把年轻医生震麻", check: () => false },
            { id: "H13", name: "隐藏传说: 垃圾场", cond: "少儿期将作文作业写成《垃圾场》毁灭小说", check: () => false },
            { id: "H14", name: "隐藏传说: 钟鼓楼", cond: "在元旦晚会上用破吉他弹唱《钟鼓楼》", check: () => false },
            { id: "H15", name: "隐藏传说: 一无所有", cond: "襁褓中听崔健一无所有并飞踢飞襁褓", check: () => false },
            { id: "H16", name: "隐藏传说: 假行僧", cond: "在公园跳舞跟着假行僧伴奏闪到腰", check: () => false },
            { id: "H17", name: "隐藏传说: 花房姑娘", cond: "宿舍楼下唱花房姑娘被泼高能冷凝水", check: () => false },
            { id: "H18", name: "隐藏传说: 走出荒漠", cond: "从最危险的S级大灾难中奇迹般活下来", check: () => false },
            { id: "H19", name: "隐藏传说: 太阳", cond: "活到100岁打破人类衰老枷锁", check: () => false },
            { id: "H20", name: "隐藏传说: 摇滚不死", cond: "带着‘摇滚不坏金身’天赋活到100岁", check: () => false }
        ];

        const ALL_ACHIEVEMENTS = [...NORMAL_ACHIEVEMENTS, ...HIDDEN_ACHIEVEMENTS];

        // 5选3 词条池：包含5个世界背景和5个强力天赋
        const MIXED_POOL = [
            { type: 'w', id: 1, name: "🌍 高燃赛博未来", desc: "自动养老舱遍地。初始财富+2，颜值+1", effect: () => { P.m+=2; P.f+=1; currentBackground="赛博"; } },
            { type: 'w', id: 2, name: "🌍 修仙科技时代", desc: "3D打印炼丹，九转金丹在线热卖。初始智力+3", effect: () => { P.i+=3; currentBackground="修仙"; } },
            { type: 'w', id: 3, name: "🌍 废土垃圾纪元", desc: "地球枯竭捡垃圾度日。初始体质+2，财富-1", effect: () => { P.h+=2; P.m-=1; currentBackground="废土"; } },
            { type: 'w', id: 4, name: "🌍 市井炊烟时代", desc: "安居乐业吃喝不愁。初始体质+1，财富+1", effect: () => { P.h+=1; P.m+=1; currentBackground="市井"; } },
            { type: 'w', id: 5, name: "🌍 虚拟元宇宙", desc: "精神在虚拟网蹦迪。初始智力+2，体质-1", effect: () => { P.i+=2; P.h-=1; currentBackground="元宇宙"; } },
            { type: 't', id: 6, name: "⭐ 纳米面部重塑", desc: "面部细胞科技改写：颜值 +4，初始财富 -1", effect: () => { P.f+=4; P.m-=1; } },
            { type: 't', id: 7, name: "⭐ 脑机超频植入", desc: "思维算力跨越：智力 +3，初始体质 -1", effect: () => { P.i+=3; P.h-=1; } },
            { type: 't', id: 8, name: "⭐ 继承神秘矿山", desc: "家里有矿：初始财富 +5，初始智力 -1", effect: () => { P.m+=5; P.i-=1; } },
            { type: 't', id: 9, name: "⭐ 量子养生大师", desc: "养生血脉：初始体质 +4，初始颜值 -1", effect: () => { P.h+=4; P.f-=1; } },
            { type: 't', id: 10, name: "⭐ 摇滚不坏金身", desc: "摇滚不灭：初始体质 +3，音乐大事件免疫伤害", effect: () => { P.h+=3; } }
        ];

        // 10大灭绝性灾难（强弱判定判定）
        const DISASTER_EVENTS = {
            "赛博": { age: 24, text: "🔥【S级世界灾难：AI仿生人暴动】因你【智力不足3】未能破解电子安全锁，吸入高浓烟雾！（体质-5）", check: () => { if(P.i<3) P.h-=5; else { triggerHidden(1); triggerNormal("N46"); } } },
            "修仙": { age: 30, text: "⚡【S级世界灾难：天劫系统短路】雷暴大无差别轰炸！因你【体质低于4】护体元气碎裂！（体质-6）", check: () => { if(P.h<4) P.h-=6; else { triggerHidden(2); triggerNormal("N46"); } } },
            "废土": { age: 16, text: "☢️【S级世界灾难：超能核爆辐射】因你【财富值小于3】买不起辐射防护服，全身皮肤化脓！（颜值-5，体质-2）", check: () => { if(P.m<3) { P.f-=5; P.h-=2; } else { triggerHidden(18); triggerNormal("N46"); } } },
            "市井": { age: 45, text: "🌊【S级世界灾难：百年特大洪水泥石流】因你【体质低于3】在洪水中瞬间失去反抗力！（体质-5）", check: () => { if(P.h<3) P.h-=5; else { triggerHidden(18); triggerNormal("N46"); } } },
            "元宇宙": { age: 28, text: "💾【S级世界灾难：主脑意识海大坍塌】因你【智力不足4】未及时切断脑机连接，精神受损！（智力-5）", check: () => { if(P.i<4) P.i-=5; else { triggerHidden(18); triggerNormal("N46"); } } }
        };

        // 细化为6大年龄阶段的50个常规与【中国摇滚专属】核心事件库
        const STAGE_EVENTS = {
            baby: [ // 0-3岁 婴儿期

        // ============================================================
        // 游戏核心引擎逻辑
        // ============================================================
        let frozenHealthCount = 0;

        window.onload = function() {
            rollOpeningOptions();
            renderAchievements();
        };

        function rollOpeningOptions() {
            const listDiv = document.getElementById('poolList');
            listDiv.innerHTML = "";
            selectedItems = [];
            let shuffled = [...MIXED_POOL].sort(() => 0.5 - Math.random()).slice(0, 5);
            shuffled.forEach(item => {
                const dom = document.createElement('div');
                dom.className = 'option-item';
                dom.innerHTML = `<div class="option-name">${item.name}</div><div class="option-desc">${item.desc}</div>`;
                dom.onclick = () => {
                    if (selectedItems.includes(item)) {
                        selectedItems = selectedItems.filter(x => x !== item);
                        dom.classList.remove('selected');
                    } else {
                        if (selectedItems.length >= 3) return;
                        selectedItems.push(item);
                        dom.classList.add('selected');
                    }
                    document.getElementById('poolSelectHint').textContent = `请选择 3 个作为你的开局词条 (${selectedItems.length}/3)`;
                    const btn = document.getElementById('poolBtn');
                    if (selectedItems.length === 3) {
                        btn.disabled = false;
                        btn.textContent = "确认组合，前往分配点数";
                    } else {
                        btn.disabled = true;
                        btn.textContent = "未选满3个选项";
                    }
                };
                listDiv.appendChild(dom);
            });
        }

        function renderAchievements() {
            const div = document.getElementById('achieveList');
            div.innerHTML = "";
            ALL_ACHIEVEMENTS.forEach(a => {
                const isUnlocked = unlockedArr.includes(a.id);
                const isHidden = a.id.startsWith('H');
                const item = document.createElement('div');
                if (isHidden) {
                    if (isUnlocked) {
                        item.className = 'achieve-item unlocked';
                        item.innerHTML = `🌟 [隐藏传说] 《${a.name}》 - 已达成！`;
                    } else {
                        item.className = 'achieve-item hidden-lock';
                        item.innerHTML = `🔒 [隐藏传说] ??? - 未解锁（条件绝对保密）`;
                    }
                } else {
                    item.className = `achieve-item ${isUnlocked ? 'unlocked' : ''}`;
                    item.innerHTML = `🏆 ${a.name} - ${isUnlocked ? '【已解锁】' : '【未解锁】'} (条件: ${a.cond})`;
                }
                div.appendChild(item);
            });
        }

        function goToSetup() {
            selectedItems.forEach(item => item.effect());
            document.getElementById('poolSection').classList.add('hidden');
            document.getElementById('setupSection').classList.remove('hidden');
            updateAttrDisplay();
        }

        function updateAttrDisplay() {
            document.getElementById('ptsNum').textContent = rem;
            document.getElementById('fVal').textContent = P.f;
            document.getElementById('iVal').textContent = P.i;
            document.getElementById('hVal').textContent = P.h;
            document.getElementById('mVal').textContent = P.m;
        }

        function adj(key, delta) {
            if ((rem <= 0 && delta > 0) || (P[key] + delta < -5 && delta < 0)) return; 
            P[key] += delta; rem -= delta;
            updateAttrDisplay();
            const btn = document.getElementById('startBtn');
            if (rem === 0) {
                btn.disabled = false;
                btn.textContent = '点数已分配好，开启重开人生';
            } else {
                btn.disabled = true;
                btn.textContent = '自由分配点数必须全部用完';
            }
        }

        function startGame() {
            gender = Math.random() < 0.5 ? '男' : '女';
            document.getElementById('startMenu').classList.add('hidden');
            document.getElementById('gamePanel').classList.remove('hidden');
            age = 0;
            renderYear(0);
        }

        function getEvents(age) {
            if (age === 0) {
                let sNames = selectedItems.map(x=>x.name).join(' | ');
                return [{ text: `你降生了。携带初始特质：[ ${sNames} ]。系统随机分配性别为【${gender}】。`, tag: 'special', eff: () => {} }];
            }
            if (currentBackground && DISASTER_EVENTS[currentBackground]) {
                const dis = DISASTER_EVENTS[currentBackground];
                if (dis.age === age) return [{ text: dis.text, tag: 'disaster', eff: dis.check }];
            }
            let pool = STAGE_EVENTS.baby;
            if (age >= 60) pool = STAGE_EVENTS.old;
            else if (age >= 36) pool = STAGE_EVENTS.middle;
            else if (age >= 19) pool = STAGE_EVENTS.young;
            else if (age >= 13) pool = STAGE_EVENTS.teen;
            else if (age >= 4) pool = STAGE_EVENTS.child;

            const ev = pool[Math.floor(Math.random() * pool.length)];
            return [{ text: ev.text, tag: ev.tag, eff: ev.eff }];
        }

        function nextYear() {
            age++;
            renderYear(age);
        }

        function triggerHidden(num) {
            const hidId = `H${num}`;
            if(!unlockedArr.includes(hidId)) {
                unlockedArr.push(hidId);
                localStorage.setItem('re_rock_ach_v3', JSON.stringify(unlockedArr));
                const target = ALL_ACHIEVEMENTS.find(x => x.id === hidId);
                const wrap = document.getElementById('logWrap');
                wrap.innerHTML = `<div class="log-item" style="color:#ffcc00; font-weight:bold;">✨【解锁绝密隐藏成就】《${target.name}》已载入地下成名堂！</div>` + wrap.innerHTML;
            }
        }

        function triggerNormal(id) {
            if(!unlockedArr.includes(id)) {
                unlockedArr.push(id);
                localStorage.setItem('re_rock_ach_v3', JSON.stringify(unlockedArr));
                const target = ALL_ACHIEVEMENTS.find(x => x.id === id);
                const wrap = document.getElementById('logWrap');
                wrap.innerHTML = `<div class="log-item" style="color:#ffcc00;">🏆【达成普通成就】《${target.name}》已解锁！</div>` + wrap.innerHTML;
            }
        }

        function checkNormalAchievements() {
            NORMAL_ACHIEVEMENTS.forEach(a => {
                if (!unlockedArr.includes(a.id) && a.check()) {
                    unlockedArr.push(a.id);
                    localStorage.setItem('re_rock_ach_v3', JSON.stringify(unlockedArr));
                    const wrap = document.getElementById('logWrap');
                    wrap.innerHTML = `<div class="log-item" style="color:#ffcc00;">🏆【达成普通成就】《${a.name}》已解锁！</div>` + wrap.innerHTML;
                }
            });
        }

        function renderYear(age) {
            const wrap = document.getElementById('logWrap');
            const events = getEvents(age);
            
            events.forEach(ev => {
                ev.eff();
                // 摇滚不坏金身天赋保命判定
                if(selectedItems.some(x=>x.name.includes("摇滚不坏金身")) && ev.tag === "disaster") {
                    P.h += 6; // 强行拉回伤点
                    wrap.innerHTML = `<div class="log-item" style="color:#9955ff;">🛡️【天赋免疫】你凭借“摇滚不坏金身”强行抗下了这场世界末日！</div>` + wrap.innerHTML;
                }
                wrap.innerHTML = `<div class="log-item"><span class="age-tag">${age}岁</span><span class="${ev.tag}">${ev.text}</span></div>` + wrap.innerHTML;
            });

            if (P.f > maxStats.f) maxStats.f = P.f;
            if (P.i > maxStats.i) maxStats.i = P.i;
            if (P.h > maxStats.h) maxStats.h = P.h;
            if (P.m > maxStats.m) maxStats.m = P.m;

            if (P.h < 1) frozenHealthCount++;
            else frozenHealthCount = 0;
            if (frozenHealthCount >= 5) triggerNormal("N33");

            document.getElementById('ageDisplay').textContent = age + '岁';
            document.getElementById('gDisp').textContent = gender;
            document.getElementById('mDisp').textContent = P.m;
            document.getElementById('iDisp').textContent = P.i;
            document.getElementById('hDisp').textContent = P.h;
            document.getElementById('fDisp').textContent = P.f;

            let dieReason = "";
            if (P.h <= 0) { isGameOver = true; dieReason = "【体质归零】免疫系统在这一年崩溃，引发大面积器官衰竭英年早逝。"; }
            else if (P.m <= 0) { isGameOver = true; dieReason = "【财富归零】没有面包和居所，最终在深冬寒冷的桥洞下停止了呼吸。"; }
            else if (P.i <= 0) { isGameOver = true; dieReason = "【智力归零】丧失了人类基本心智与常识，沦为高频尖叫的疯人院开水壶。"; }
            else if (P.f <= 0) { isGameOver = true; dieReason = "【颜值归零】异变成极度反生物的骇人面容，出门买盐当场吓死三名无辜群众，作为危险兵器被捕处决。"; }

            if (!isGameOver) {
                if (age <= 5 && P.h <= 2 && Math.random() < 0.15) { isGameOver = true; dieReason = "【幼年夭折】你因体质过于单薄，没能熬过今年异常凛冽的冬天。"; }
                let dieChance = (age - 68) * 0.026 - (P.h * 0.005);
                if (dieChance < 0.01) dieChance = 0.01;
                if (age >= 72 && Math.random() < dieChance) { isGameOver = true; dieReason = "【寿终正寝】你完成了波澜壮阔的一生，在温暖的睡梦中安详闭眼。"; }
                if (age >= 120) { isGameOver = true; dieReason = "【天道极限】你活到了 120 岁，身体细胞分裂彻底达到了人类绝对上限。"; }
            }

            if (isGameOver && age < 10) triggerHidden(10);
            if (age >= 100) {
                triggerHidden(19);
                if(selectedItems.some(x=>x.name.includes("摇滚不坏金身"))) triggerHidden(20);
            }

            checkNormalAchievements();

            if (isGameOver) {
                wrap.innerHTML = `<div class="log-item"><span class="age-tag">${age}岁</span><span class="bad" style="font-weight:bold;">💥【游戏结束】${dieReason}（享年${age}岁）。</span></div>` + wrap.innerHTML;
                const btn = document.getElementById('nextBtn');
                btn.textContent = '命数已尽，点此再度重开';
                btn.onclick = () => location.reload();
            }
        }
    </script>
</body>
</html>
