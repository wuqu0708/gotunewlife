<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人生重开模拟器 - 史诗大屏版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0d14; font-family: sans-serif; color: #f1f3f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 30px 20px; }
        
        /* 【核心修改：界面容器彻底放大】最大宽度从440px扩容至800px */
        .container { width: 100%; max-width: 800px; background: #131924; border-radius: 20px; padding: 36px; box-shadow: 0 12px 50px rgba(0,0,0,0.7); border: 1px solid #1e2638; }
        
        .header { text-align: center; margin-bottom: 24px; }
        /* 放大标题字号 */
        .header h1 { font-size: 36px; letter-spacing: 4px; background: linear-gradient(135deg, #fff, #8ab4f8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        
        /* 放大子标题和剩余点数显示 */
        .pts-display, .sub-title { text-align: center; font-size: 18px; color: #adb5bd; margin-bottom: 24px; }
        .pts-display span { color: #fcc419; font-size: 32px; font-weight: bold; }
        
        .talent-list { margin-bottom: 24px; }
        /* 放大天赋卡片尺寸与字号 */
        .talent-item { background: #1c2333; padding: 16px 20px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; border: 2px solid transparent; -webkit-tap-highlight-color: transparent; }
        .talent-item.selected { border-color: #1c7ed6; background: #22324d; }
        .talent-name { font-weight: bold; color: #fcc419; margin-bottom: 6px; font-size: 18px; }
        .talent-desc { font-size: 15px; color: #adb5bd; line-height: 1.4; }

        /* 放大属性调整行的尺寸和间距 */
        .attr-row { display: flex; align-items: center; justify-content: space-between; background: #1c2333; padding: 14px 24px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #253147; }
        .attr-row button { width: 50px; height: 50px; border: none; border-radius: 8px; background: #2c384e; color: #fff; font-size: 26px; font-weight: bold; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .attr-row button:active { background: #3b4b66; }
        .attr-row .label { color: #adb5bd; font-size: 18px; font-weight: bold; }
        .attr-row span[id$="Val"] { font-size: 22px; font-weight: bold; color: #fff; min-width: 30px; text-align: center; }
        
        /* 放大交互按钮的高度和字号 */
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; margin-top: 24px; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn-start { background: #2c384e; color: #868e96; }
        .btn-start.active { background: #1c7ed6; color: #fff; box-shadow: 0 4px 16px rgba(28,126,214,0.4); }
        .btn-start.active:active { background: #1a6cb3; }
        .btn-next { background: #1c7ed6; color: #fff; box-shadow: 0 4px 16px rgba(28,126,214,0.3); }
        .btn-next:active { background: #1a6cb3; }
        .btn-danger { background: #e03131; color: #fff; }
        
        /* 状态栏放大，在宽屏上显示更舒展 */
        .status-bar { background: #1c2333; border-radius: 12px; padding: 16px 20px; display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 18px; border: 1px solid #253147; flex-wrap: wrap; gap: 8px; align-items: center; }
        .status-bar span, .status-bar div { font-size: 16px; }
        
        /* 【核心修改：日志面板深度加高、字号放大】 */
        .log-wrap { height: 480px; overflow-y: auto; background: #090c12; border-radius: 12px; padding: 16px 20px; display: flex; flex-direction: column-reverse; border: 1px solid #171f2e; }
        .log-item { padding: 12px 0; border-bottom: 1px solid #1c2333; font-size: 16px; line-height: 1.7; }
        .age-tag { color: #fcc419; font-weight: bold; margin-right: 12px; font-size: 16px; min-width: 45px; display: inline-block; }
        
        .good { color: #51cf66; } 
        .bad { color: #ff6b6b; } 
        .normal { color: #ced4da; } 
        .funny { color: #ff922b; font-style: italic; } 
        .special { color: #cc5de8; font-weight: bold; }
        .mutation { color: #339af0; font-weight: bold; animation: pulse 1s infinite alternate; }
        .hidden { display: none !important; }
        @keyframes pulse { from { text-shadow: 0 0 2px #339af0; } to { text-shadow: 0 0 8px #339af0; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>人生重开模拟器</h1>
        </div>

        <div id="talentPanel">
            <div class="sub-title">请挑选一个能改变命运的天赋</div>
            <div class="talent-list" id="talentList"></div>
            <button class="btn btn-start" id="talentBtn" onclick="goToSetup()" disabled>请选择天赋</button>
        </div>

        <div id="setupPanel" class="hidden">
            <div class="pts-display">剩余点数 <span id="ptsNum">20</span></div>
            <div class="attr-row"><span class="label">颜值</span><button onclick="adj('f',-1)">−</button><span id="fVal">0</span><button onclick="adj('f',1)">+</button></div>
            <div class="attr-row"><span class="label">智力</span><button onclick="adj('i',-1)">−</button><span id="iVal">0</span><button onclick="adj('i',1)">+</button></div>
            <div class="attr-row"><span class="label">体质</span><button onclick="adj('h',-1)">−</button><span id="hVal">0</span><button onclick="adj('h',1)">+</button></div>
            <div class="attr-row"><span class="label">财富</span><button onclick="adj('m',-1)">−</button><span id="mVal">0</span><button onclick="adj('m',1)">+</button></div>
            <button class="btn btn-start" id="startBtn" disabled onclick="startGame()">请分配完点数</button>
        </div>

        <div id="gamePanel" class="hidden">
            <div class="status-bar">
                <span id="ageDisplay" style="color:#fcc419; font-weight:bold; font-size: 18px;">0岁</span>
                <div>
                    🧑<span id="gDisp"></span> 💰<span id="mDisp"></span> 🧠<span id="iDisp"></span> 💪<span id="hDisp"></span> 😊<span id="fDisp"></span>
                </div>
            </div>
            <div class="log-wrap" id="logWrap"></div>
            <button class="btn btn-next" id="nextBtn" onclick="nextYear()">下一年</button>
        </div>
    </div>

    <script>
        let P = { f: 0, i: 0, h: 0, m: 0 }, rem = 20, age = -1, gender = '随机', selectedTalent = null, currentWorld = null, mutationTriggered = false;

        const WORLD_BACKGROUNDS = [
            { name: "高燃赛博未来", desc: "满街都是会做家务的仿生人，老龄化问题靠全自动养老舱解决，出门坐磁悬浮飞行器。" },
            { name: "修仙科技并存时代", desc: "炼丹靠3D打印，御剑飞行要考‘修仙驾照’，宗门长老天天在线带货卖九转金丹。" },
            { name: "废土垃圾回收纪元", desc: "地球资源枯竭，人类全靠捡电子垃圾和过滤合成蛋白质糊糊度日，不过好在wifi免费。" },
            { name: "市井炊烟大时代", desc: "这是一个安稳的时代。天下太平，百姓安居乐业。最大的烦恼就是明早吃肉包子还是菜包子。" },
            { name: "疯狂元宇宙虚拟时代", desc: "人类90%的时间肉体躺在营养舱里，精神在虚拟世界蹦迪，现实中只有疯狂上夜班的扫地机。" },
            { name: "蒸汽朋克飞艇帝国", desc: "齿轮与巨型飞艇遮天蔽日，烧高纯度燃煤的机械外骨骼在街头随处可见，贵族们热衷于喝下午茶。" },
            { name: "魔法与巨龙低保世界", desc: "魔法学院毕业包分配，由于巨龙一族遭到过度捕捞陷入绝迹，现在的魔法使们只能骑着电动扫帚扫大街。" },
            { name: "克苏鲁触手海鲜档", desc: "天空中长着若隐若现的眼球，由于不可名状的神祇苏醒，大家理智降低，海鲜大排档的章鱼触手开始自己跳舞。" },
            { name: "规则怪谈恐怖高校", desc: "世界上充满了各种不可思议的规则。‘不要在凌晨吃辣条’‘不要直视穿红衣服的扫地机器人’。" },
            { name: "远古石器疯狂原始人", desc: "野兽横行，人类还处于钻木取火的起步阶段，每天的核心任务就是提着木棒去追猛犸象。" }
        ];

        const MUTATION_EVENTS = {
            "高燃赛博未来": {
                triggerAge: [20, 35],
                text: "【世界突变】扫地机器人觉醒反抗意识！你由于阻挡了智能马桶的冲锋，大腿被咬了一口！（体质-2）",
                effect: () => { P.h -= 2; }
            },
            "修仙科技并存时代": {
                triggerAge: [22, 38],
                text: "【世界突变】天道服务器宕机，雷劫系统发生致命Bug！劈下来一亿伏特纯净工业电。你差点被电熟，但灵魂顿悟了。（智力+3，体质-2）",
                effect: () => { P.i += 3; P.h -= 2; }
            },
            "市井炊烟大时代": {
                triggerAge: [24, 40],
                text: "【世界突变】镇上掀起‘全民套圈大热潮’！你用高超的眼力用三个铜板套中了一尊金佛，一夜暴富！（财富+5）",
                effect: () => { P.m += 5; }
            },
            "废土垃圾回收纪元": {
                triggerAge: [15, 30],
                text: "【世界突变】废土中心卷起了一座‘肥宅快乐水’矿山。你趁乱偷了两箱，发了笔小财！（财富+3）",
                effect: () => { P.m += 3; }
            },
            "疯狂元宇宙虚拟时代": {
                triggerAge: [25, 45],
                text: "【世界突变】主服务器遭遇黑客攻击，整个虚拟世界遭遇‘降维打击’。所有的帅哥美女瞬间退化成马赛克，你的精神受到震撼！（颜值-2）",
                effect: () => { P.f -= 2; }
            },
            "蒸汽朋克飞艇帝国": {
                triggerAge: [21, 36],
                text: "【世界突变】帝国的燃煤锅炉发生连锁大爆炸，遮天蔽日的煤烟吸入肺部，整个帝国的人都开始剧烈咳嗽。（体质-2）",
                effect: () => { P.h -= 2; }
            },
            "魔法与巨龙低保世界": {
                triggerAge: [18, 32],
                text: "【世界突变】魔法元素周期表更新，发现了全新的狂暴元素，你因为在实验室偷偷围观，智商直接被辐射提高了！（智力+3）",
                effect: () => { P.i += 3; }
            },
            "克苏鲁触手海鲜档": {
                triggerAge: [23, 42],
                text: "【世界突变】天上的眼球突然眨了一下，你理智疯狂蒸发，但意外和不可名状的存在达成了契约，突然获得了大量祭祀金币！（财富+4，智力-1）",
                effect: () => { P.m += 4; P.i -= 1; }
            },
            "规则怪谈恐怖高校": {
                triggerAge: [19, 34],
                text: "【世界突变】你成功破解了一条绝密规则：‘假装自己是NPC可以逃避期末考试’。你不仅没挂科，还白嫖了一笔奖学金！（智力+2，财富+2）",
                effect: () => { P.i += 2; P.m += 2; }
            },
            "远古石器疯狂原始人": {
                triggerAge: [16, 28],
                text: "【世界突变】部落遭遇了百年一遇的恐龙大迁徙，你拼死抗击捡到了龙蛋，吃下后整个人力大无穷！（体质+4）",
                effect: () => { P.h += 4; }
            }
        };

        const TALENT_POOL = [
            { id: 1, name: '生而为男', desc: '性别必定为男', effect: () => { gender = '男'; } },
            { id: 2, name: '面部纳米重塑', desc: '颜值 +4，初始财富 -1', effect: () => { P.f += 4; P.m -= 1; } },
            { id: 3, name: '脑机接口超频', desc: '智力 +3，但由于发热，体质 -1', effect: () => { P.i += 3; P.h -= 1; } },
            { id: 4, name: '继承神秘矿山', desc: '初始财富 +5，智力 -1', effect: () => { P.m += 5; P.i -= 1; } },
            { id: 5, name: '量子养生大师', desc: '体质 +4，颜值 -1', effect: () => { P.h += 4; P.f -= 1; } },
            { id: 6, name: '欧皇转世', desc: '全属性各分配 +1 点', effect: () => { P.f += 1; P.m += 1; P.i += 1; P.h += 1; } },
            { id: 7, name: '重金求子', desc: '初始财富 +5', effect: () => { P.m += 5; } },
            { id: 8, name: '美若天仙', desc: '颜值 +5', effect: () => { P.f += 5; } },
            { id: 9, name: '百年一遇', desc: '智力 +5', effect: () => { P.i += 5; } },
            { id: 10, name: '金刚不坏', desc: '体质 +5', effect: () => { P.h += 5; } }
        ];

        const BASE_EVENTS = {
            child: [
                { text: '你在班里掀起了“量子速读”的风潮，因为翻书声音太大，被班主任当成电风扇关掉了。', tag: 'funny', effect: () => {} },
                { text: '你瞒着父母偷偷去铁匠铺定制了一把重达三十斤的铁琵琶，结果把自己的脚趾头给砸飞了。（体质-1）', tag: 'bad', effect: () => { P.h -= 1; } },
                { text: '上学路上试图用意念控制红绿灯，驻足观看了半小时后，智商受到了路人的质疑。', tag: 'funny', effect: () => {} },
                { text: '你在学校门口的自动贩卖机前表演“机械舞”，贩卖机判定故障，疯狂吐出了十瓶快乐水！（财富+1）', tag: 'good', effect: () => { P.m += 1; } },
                { text: '你上幼儿园大班，用AI写了一篇三万字的小说，震惊了整个幼教界。（智力+2）', tag: 'good', effect: () => { P.i += 2; } },
                { text: '你试图和家里的智能机械狗抢骨头吃，被当场电击，头发变成了爆炸头。（体质-1）', tag: 'bad', effect: () => { P.h -= 1; } },
                { text: '你在泥坑里捡到了一块发光的古代晶片，擦干净卖掉了。（财富+2）', tag: 'good', effect: () => { P.m += 2; } },
                { text: '你在全校大会上作为代表发言，结果一开口把“老师好”说成了“太上皇吉祥”，全场笑翻。', tag: 'funny', effect: () => {} },
                { text: '你疯狂练习单手倒立洗头，虽然经常栽进水桶，但脖子肌肉得到了大幅增强。（体质+1）', tag: 'good', effect: () => { P.h += 1; } },
                { text: '你跟同学打赌吞下了一颗发光糖果，结果在晚上拉出来的粑粑居然是自带荧光的。（智力-1）', tag: 'bad', effect: () => { P.i -= 1; } },
                { text: '你长得太清秀可爱，被小区的王大妈强行拉去当童装网店模特，赚到了零花钱。（财富+1，颜值+1）', tag: 'good', effect: () => { P.m += 1; P.f += 1; } },
                { text: '你把家里的智能马桶魔改成了一个能弹射起步的卡丁车，拆完之后彻底装不回去了。（财富-1，智力+1）', tag: 'funny', effect: () => { P.m -= 1; P.i += 1; } }
            ],
            young: [
                { text: '你跟风买了一种宣称能百分百赚钱的‘赛博空气币’，第二天发行方跑路去火星了。（财富-3）', tag: 'bad', effect: () => { P.m -= 3; } },
                { text: '入职新公司后，你凭借“用模板写周报、用假笑做PPT”的精湛技术，获封“办公室摸鱼大师”。', tag: 'good', effect: () => {} },
                { text: '你下定决心去健身房办了年卡，坚持锻炼了一整年，练出了令人羡慕的腹肌！（体质+2，颜值+1）', tag: 'good', effect: () => { P.h += 2; P.f += 1; } },
                { text: '你尝试跟风炒股，精准踩中了所有的暴跌节点，你的账户绿得像一片大草原。（财富-2）', tag: 'bad', effect: () => { P.m -= 2; } },
                { text: '你在路边大排档吃烧烤，旁边的仿生人因为漏电突然开始跳霹雳舞，把你的烤串全震飞了。', tag: 'funny', effect: () => {} },
                { text: '你沉迷于通宵拼装乐高机甲，由于经常熬夜，你的黑眼圈已经浓郁得像一只熊猫。（颜值-1）', tag: 'bad', effect: () => { P.f -= 1; } },
                { text: '你在网上连夜发表了一篇《论如何利用量子纠缠教鹦鹉说脏话》，瞬间爆火并拿到了稿费。（智力+1，财富+2）', tag: 'good', effect: () => { P.i += 1; P.m += 2; } },
                { text: '你报名参加了“全星际大胃王争霸赛”，因为高强度吞噬压缩饼干，胃部大受重创。（体质-2）', tag: 'bad', effect: () => { P.h -= 2; } },
                { text: '你鼓起勇气跟心仪的虚拟主播告白，结果发现对方背后的动捕演员其实是你五十岁的亲叔叔。', tag: 'funny', effect: () => {} },
                { text: '你买了一件自称能自动搭配的“智能发光西装”，穿上后走在路上因为漏电狂跳探戈。（颜值-1）', tag: 'bad', effect: () => { P.f -= 1; } },
                { text: '你在垃圾堆里淘到一本《速成秘籍：从入门到入土》，瞎练了一年居然真的气沉丹田了！（体质+2）', tag: 'good', effect: () => { P.h += 2; } },
                { text: '你凭借高超的聊天话术，成功在兼职中忽悠了三个大老板投资你的“空气炸锅魔改计划”。（财富+3）', tag: 'good', effect: () => { P.m += 3; } },
                { text: '相亲时你展示了高超的“单手敲代码”技能，对方觉得你可能脑子有坑，起身顺走了你的单反。（财富-1）', tag: 'funny', effect: () => { P.m -= 1; } }
            ],
            middle: [
                { text: '人到中年，你终于放弃了拯救世界的梦想，加入了‘河边钓仿真机械鱼’的佛系大军。', tag: 'normal', effect: () => {} },
                { text: '你买了一个全自动颈椎按摩仪，结果该设备系统中毒，差点把你旋转360度送走。（体质-1）', tag: 'funny', effect: () => { P.h -= 1; } },
                { text: '你终于攒够了钱，给自己的腰椎换成了钛合金不锈钢版本的，下雨天走路会发出交响乐。（体质+3，财富-2）', tag: 'good', effect: () => { P.h += 3; P.m -= 2; } },
                { text: '你在打坐冥想时，脑子里全是昨天排练的劲爆鼓点，导致功法逆流。（智力-1，体质-1）', tag: 'funny', effect: () => { P.i -= 1; P.h -= 1; } },
                { text: '你跟风投资了“火星生蚝养殖基地”，因为火星没有水，你的投资血本无归。（财富-3）', tag: 'bad', effect: () => { P.m -= 3; } },
                { text: '为了防止中年脱发，你斥巨资购买了强力生发头盔，由于辐射太高，头发没长出来，智力似乎变高了。（智力+2，财富-2）', tag: 'good', effect: () => { P.i += 2; P.m -= 2; } },
                { text: '你在小区里和刘大爷因为一盘象棋争得面红耳赤，最后通过“赛博掰手腕”赢了对方。（体质+1）', tag: 'good', effect: () => { P.h += 1; } },
                { text: '你的脸部皮肤遭遇了不可逆的“地心引力大摧毁”，整个人看起来老了二十岁。（颜值-2）', tag: 'bad', effect: () => { P.f -= 2; } },
                { text: '因为长时间坐在电脑前不挪窝，你的腰间盘高调突出，疼得你在床上躺了半个月。（体质-1）', tag: 'bad', effect: () => { P.h -= 1; } },
                { text: '你在大扫除时发现了年轻时藏在全息相框后面的私房钱，激动得老泪纵横。（财富+1）', tag: 'good', effect: () => { P.m += 1; } },
                { text: '你试图教孩子写脑波微积分，由于孩子实在太笨，你气得血压飙升。', tag: 'funny', effect: () => {} },
                { text: '你因为长年累月的行业经验，成功晋升为单位的技术总监，虽然工资涨了，但头彻底秃了。（财富+2，颜值-1）', tag: 'good', effect: () => { P.m += 2; P.f -= 1; } }
            ],
            old: [
                { text: '在小区的广场舞争霸赛中，由于你使用了最新的外骨骼辅助器，跳出一套极其硬核的机械舞，震惊全场。（颜值+1）', tag: 'good', effect: () => { P.f += 1; } },
                { text: '身体零部件老化严重，你现在去医院体检，医生第一句话总是：‘你这主板该清灰了’。（体质-1）', tag: 'bad', effect: () => { P.h -= 1; } },
                { text: '遭遇了专门针对老年人的“神医包治百病”磁场床垫骗局，幸好你卡里没钱，骗子把你拉黑了。', tag: 'funny', effect: () => {} },
                { text: '你瞒着老伴参加了“夕阳红跨星系超远程旅游团”，结果飞船因为欠费被扣押在月球服务区。', tag: 'funny', effect: () => {} },
                { text: '你脑子越来越忘事，出去买菜不仅忘记带钱包，甚至把大孙子落在了菜市场。（智力-1）', tag: 'bad', effect: () => { P.i -= 1; } },
                { text: '因为坚持每天打八段锦，你的身体骨骼依然硬朗，去医院体检把年轻的主治医生惊呆了。（体质+2）', tag: 'good', effect: () => { P.h += 2; } },
                { text: '你尝试戴上墨镜去河边用高科技量子鱼竿钓鱼，结果除了一只破烂的机械拖鞋什么也没钓上来。', tag: 'funny', effect: () => {} },
                { text: '你在老年大学里自学了“全息水彩画”，你的画作被赞誉为“当代最迷幻的抽象艺术”，卖了一笔好钱。（财富+2）', tag: 'good', effect: () => { P.m += 2; } },
                { text: '因为长相慈祥，你在小区里深受野猫们的喜爱，每天被十多只猫猫围观蹭裤脚。（颜值+1）', tag: 'good', effect: () => { P.f += 1; } },
                { text: '你跟隔壁张大爷用高科技手段下盲棋，结果因算力不足系统当场死机，你输掉了半个月低保。（财富-1）', tag: 'bad', effect: () => { P.m -= 1; } },
                { text: '你坐在藤椅上晒太阳，突然看透了年轻时拼死拼活争夺的各种虚名，内心得到了极大的平静。（智力+1）', tag: 'special', effect: () => { P.i += 1; } },
                { text: '你决定给自己的假牙升级成具有独立音响功能的“蓝牙蹦迪款”，晚上睡觉时嘴巴里一直在放重金属摇滚。', tag: 'funny', effect: () => {} },
                { text: '你突然想起来年轻时好像借给过隔壁王路飞一笔巨款，现在去要账，王路飞表示自己早就不当海贼改去种地了。', tag: 'funny', effect: () => {} }
            ]
        };

        const HIGH_ATTR_EVENTS = {
            rich: [
                { text: '【财富线】你动用名下的数字资产包下了市中心整栋全息投影大楼，用来播放你昨晚连夜录制的洗脑山歌。（财富-1，颜值+2）', tag: 'special', effect: () => { P.m -= 1; P.f += 2; } },
                { text: '【财富线】你购买了一辆限量版全金箔磁悬浮超跑，走在路上反光极其耀眼，路人纷纷大呼闪瞎狗眼。（财富-2，颜值+3）', tag: 'special', effect: () => { P.m -= 2; P.f += 3; } }
            ],
            smart: [
                { text: '【天才线】你闭关三天，成功破译了隔壁宗门防御大阵的代码，并顺手植入了一个自动帮人签到的脚本。（智力+3）', tag: 'special', effect: () => { P.i += 3; } },
                { text: '【天才线】你利用量子力学原理发明了一种“永远不会在泡面时浮起来的盖子”，申请专利赚了一大笔！（智力+1，财富+3）', tag: 'special', effect: () => { P.i += 1; P.m += 3; } }
            ],
            sick: [
                { text: '【体弱线】由于长期的体质虚弱，你连吸入含有高浓度灵气的空气都会剧烈咳嗽，感觉自己快要风化了。（体质-1）', tag: 'bad', effect: () => { P.h -= 1; } }
            ],
            handsome: [
                { text: '【魅力线】你因为长得太好看，走在路上被星探强行拉去录制赛博偶像选秀，一不小心成了人气王。（财富+2，颜值+1）', tag: 'special', effect: () => { P.m += 2; P.f += 1; } }
            ]
        };

        // ============================================================
        //  控制逻辑
        // ============================================================
        window.onload = function() {
            const listDiv = document.getElementById('talentList');
            const shuffled = [...TALENT_POOL].sort(() => 0.5 - Math.random());
            shuffled.slice(0, 3).forEach(t => {
                const item = document.createElement('div');
                item.className = 'talent-item';
                item.innerHTML = `<div class="talent-name">【${t.name}】</div><div class="talent-desc">${t.desc}</div>`;
                item.onclick = () => selectTalent(item, t);
                listDiv.appendChild(item);
            });
            currentWorld = WORLD_BACKGROUNDS[Math.floor(Math.random() * WORLD_BACKGROUNDS.length)];
        };

        function selectTalent(element, talent) {
            document.querySelectorAll('.talent-item').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedTalent = talent;
            const btn = document.getElementById('talentBtn');
            btn.disabled = false;
            btn.className = 'btn btn-start active';
            btn.textContent = '下一步：分配属性';
        }

        function goToSetup() {
            document.getElementById('talentPanel').classList.add('hidden');
            document.getElementById('setupPanel').classList.remove('hidden');
        }

        function adj(key, delta) {
            if ((rem <= 0 && delta > 0) || (P[key] <= 0 && delta < 0)) return;
            P[key] += delta; rem -= delta;
            document.getElementById('ptsNum').textContent = rem;
            document.getElementById(key + 'Val').textContent = P[key];
            
            const btn = document.getElementById('startBtn');
            if (rem === 0) {
                btn.disabled = false;
                btn.className = 'btn btn-start active';
                btn.textContent = '开始重开人生';
            } else {
                btn.disabled = true;
                btn.className = 'btn btn-start';
                btn.textContent = '请分配完点数';
            }
        }

        function startGame() {
            if (selectedTalent) selectedTalent.effect();
            if (gender !== '男') {
                gender = Math.random() < 0.5 ? '男' : '女';
            }
            document.getElementById('setupPanel').classList.add('hidden');
            document.getElementById('gamePanel').classList.remove('hidden');
            age = 0;
            renderYear(0);
            }

        function getEvents(age) {
            if (age === 0) {
                let desc = `【世界背景：${currentWorld.name}】${currentWorld.desc}<br>你在该背景下出生了，性别为【${gender}】，自带天赋【${selectedTalent.name}】。`;
                desc += P.m >= 6 ? ' 你家甚至雇得起高算力智能保姆。' : ' 你家甚至连扫地机都是垃圾堆里捡的。';
                return [{ text: desc, tag: 'special', effect: () => {} }];
            }
            if (age === 6) return [{ text: '你上学了。学校今年取消了传统的授课模式，全部采用量子脑波芯片直连大脑。', tag: 'special', effect: () => {} }];
            if (age === 18) return [{ text: '你18岁成年了！这标志着你必须开始独立面对这个宏大且荒诞的世界。', tag: 'special', effect: () => {} }];
            if (age === 60) return [{ text: '你六十岁退休了。领到了第一笔数字养老低保，你立刻给自己换了一把按摩藤椅。', tag: 'special', effect: () => {} }];

            const mutation = MUTATION_EVENTS[currentWorld.name];
            if (mutation && !mutationTriggered && mutation.triggerAge.includes(age) && Math.random() < 0.5) {
                mutationTriggered = true;
                return [mutation];
            }

            if (Math.random() < 0.35) {
                if (P.m >= 7 && HIGH_ATTR_EVENTS.rich.length > 0) {
                    return [HIGH_ATTR_EVENTS.rich[Math.floor(Math.random() * HIGH_ATTR_EVENTS.rich.length)]];
                }
                if (P.i >= 7 && HIGH_ATTR_EVENTS.smart.length > 0) {
                    return [HIGH_ATTR_EVENTS.smart[Math.floor(Math.random() * HIGH_ATTR_EVENTS.smart.length)]];
                }
                if (P.f >= 7 && HIGH_ATTR_EVENTS.handsome.length > 0) {
                    return [HIGH_ATTR_EVENTS.handsome[Math.floor(Math.random() * HIGH_ATTR_EVENTS.handsome.length)]];
                }
                if (P.h <= 2 && HIGH_ATTR_EVENTS.sick.length > 0) {
                    return [HIGH_ATTR_EVENTS.sick[Math.floor(Math.random() * HIGH_ATTR_EVENTS.sick.length)]];
                }
            }

            let pool = BASE_EVENTS.child;
            if (age >= 60) pool = BASE_EVENTS.old;
            else if (age >= 36) pool = BASE_EVENTS.middle;
            else if (age >= 18) pool = BASE_EVENTS.young;

            return [pool[Math.floor(Math.random() * pool.length)]];
        }

        function nextYear() {
            age++;
            renderYear(age);
        }

        function renderYear(age) {
            const fix = (val) => val < 0 ? 0 : val;

            const wrap = document.getElementById('logWrap');
            const events = getEvents(age);
            
            events.forEach(ev => {
                ev.effect();
                wrap.innerHTML = `<div class="log-item"><span class="age-tag">${age}岁</span><span class="${ev.tag}">${ev.text}</span></div>` + wrap.innerHTML;
            });

            document.getElementById('ageDisplay').textContent = age + '岁';
            document.getElementById('gDisp').textContent = gender;
            document.getElementById('mDisp').textContent = fix(P.m);
            document.getElementById('iDisp').textContent = fix(P.i);
            document.getElementById('hDisp').textContent = fix(P.h);
            document.getElementById('fDisp').textContent = fix(P.f);

            let die = false;
            if (age <= 5 && P.h <= 2 && Math.random() < 0.15) die = true;
            let dieChance = (age - 68) * 0.022 - (P.h * 0.005);
            if (dieChance < 0.01) dieChance = 0.01;
            if (age >= 72 && Math.random() < dieChance) die = true;
            
            const MAX_AGE = 120;
            if (age >= MAX_AGE) die = true;

            if (die) {
                wrap.innerHTML = `<div class="log-item"><span class="age-tag">${age}岁</span><span class="special">【游戏结束】你在这一年闭上了双眼（享年${age}岁）。</span></div>` + wrap.innerHTML;
                const btn = document.getElementById('nextBtn');
                btn.textContent = '再次重开';
                btn.className = 'btn btn-danger';
                btn.onclick = () => location.reload();
            }
        }
    </script>
</body>
</html>
