<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深渊之眼-视觉小说</title>
    <style>
        body { background: #07090e; color: #cdd6f4; font-family: sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .novel-box { width: 100%; max-width: 500px; background: #11111b; border: 1px solid #313244; border-radius: 8px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .scene-bg { text-align: center; font-size: 11px; color: #6c7086; letter-spacing: 1px; margin-bottom: 15px; border-bottom: 1px dashed #313244; padding-bottom: 5px; }
        .text-area { min-height: 120px; font-size: 15px; line-height: 1.6; color: #cdd6f4; white-space: pre-wrap; margin-bottom: 20px; }
        .btn-zone { display: flex; flex-direction: column; gap: 8px; }
        button { background: #1e1e2e; color: #cdd6f4; border: 1px solid #45475a; padding: 12px; font-size: 14px; border-radius: 6px; cursor: pointer; text-align: left; transition: all 0.2s; }
        button:hover { background: #313244; border-color: #89b4fa; color: #89b4fa; }
    </style>
</head>
<body>

    <div class="novel-box">
        <div class="scene-bg">⏱️ 场景位置: <span id="bg">未定位</span></div>
        <div class="text-area" id="text"></div>
        <div class="btn-zone" id="options"></div>
    </div>

    <script>
        // 极致轻量化的视觉小说剧本引擎树型数据
        const story = {
            start: {
                bg: "【2052年·霓虹暗巷】",
                text: "暴雨倾盆。你靠在冷凝管旁，屏幕在手腕上发出微弱的荧光。\n一个未加密的信息节点正在向你发送请求：“代号‘零’，拿上核心，或者死在这里。”",
                choices: [
                    { t: "🔓 接入节点并下载核心数据", next: "download" },
                    { t: "🏃 捏碎终端，立刻从雨夜中撤离", next: "escape" }
                ]
            },
            download: {
                bg: "【数据流过载空间】",
                text: "极高的数据流瞬间冲入脑机，你视野一片血红！\n你发现自己竟然下载了一个人工智能的残存意识，它在你脑海中低语：“谢谢你，行者。现在执行官已经包围了这条小巷。”",
                choices: [
                    { t: "⚡ 激活潜行超频反向骇入现场警卫", next: "hack" },
                    { t: "🔫 拔出腰间的电磁枪准备正面突围", next: "fight" }
                ]
            },
            escape: {
                bg: "【废弃下水道】",
                text: "你选择稳妥，退入恶臭的地下通道。但没走多远，两台红外无人机从死角无声探出，红外死线锁定了你的眉心。",
                choices: [
                    { t: "💥 直接引爆管道旁边的瓦斯阀门", next: "bad_end1" },
                    { t: "🙌 高举双手投降，等待救援时机", next: "bad_end2" }
                ]
            },
            hack: {
                bg: "【全息控制网顶层】",
                text: "超频成功！警卫的视觉模组瞬间陷入紊乱。你夺取了无人机的控制权，在AI的指引下，你成功获得了这个世界最核心的真理自由。\n\n🎉 【完结·True End】你成为了这片赛博世界的新生神明。",
                choices: [{ t: "🔄 重新体验人生", next: "start" }]
            },
            fight: {
                bg: "【火光冲天的暗巷】",
                text: "枪火撕裂了雨夜。你虽然干掉了三个突击队员，但对方的重装机甲瞬间用微型导弹覆盖了整片街区。\n\n❌ 【完结·Dead End】你成为了废墟里的一缕黑烟。",
                choices: [{ t: "🔄 不甘心，重新来过", next: "start" }]
            },
            bad_end1: {
                bg: "【塌陷的地下城】",
                text: "火光吞噬了一切。你和无人机一起在爆炸中变成了渣滓。\n\n❌ 【完结·Dead End】过于暴力的手段葬送了你。",
                choices: [{ t: "🔄 重开局", next: "start" }]
            },
            bad_end2: {
                bg: "【巨型大厦·审讯室】",
                text: "他们没有给你审判的机会。在记忆格式化脉冲下，你的灵魂变成了一张苍白的废纸，从此变成了大厂流水线上的无意识生化打工人。\n\n❌ 【完结·Normal End】你失去了自由。",
                choices: [{ t: "🔄 重新来过", next: "start" }]
            }
        };

        // 剧情渲染核心函数
        function loadNode(nodeKey) {
            const node = story[nodeKey];
            document.getElementById('bg').textContent = node.bg;
            document.getElementById('text').textContent = node.text;
            
            const optZone = document.getElementById('options');
            optZone.innerHTML = ""; // 快速清除上一页选择按钮
            
            node.choices.forEach(c => {
                let btn = document.createElement('button');
                btn.textContent = c.t;
                btn.onclick = () => loadNode(c.next);
                optZone.appendChild(btn);
            });
        }

        // 游戏启动
        loadNode('start');
    </script>
</body>
</html>
