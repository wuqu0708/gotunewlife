<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人生重开</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0b0e14; color: #c8d0d8; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 12px; }
        .app { max-width: 480px; width: 100%; background: #131a24; border-radius: 28px; padding: 20px 18px 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.7); border: 1px solid #2a3340; }
        .title { font-size: 22px; font-weight: 600; letter-spacing: 1px; text-align: center; color: #eef2f6; margin-bottom: 4px; }
        .sub { text-align: center; font-size: 13px; color: #6b7a8a; margin-bottom: 18px; border-bottom: 1px solid #1f2a34; padding-bottom: 14px; }
        .row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; background: #0f1720; padding: 6px 12px; border-radius: 40px; border: 1px solid #1f2a34; }
        .row button { background: #1f2a34; color: #dbe1e8; border: none; width: 36px; height: 36px; border-radius: 40px; font-size: 20px; font-weight: 300; cursor: pointer; transition: 0.15s; }
        .row button:active { background: #2e3c4b; }
        .row span { min-width: 32px; text-align: center; font-size: 20px; font-weight: 500; color: #eef2f6; }
        .attr-label { width: 48px; font-size: 14px; color: #8fa0b2; }
        .pts { text-align: center; font-size: 15px; color: #8fa0b2; margin: 14px 0 8px; }
        .pts span { color: #f5c542; font-weight: 700; font-size: 22px; }
        .btn-main { width: 100%; padding: 16px; border: none; border-radius: 60px; font-size: 18px; font-weight: 600; background: #1f2a34; color: #6b7a8a; margin-top: 12px; transition: 0.15s; cursor: default; }
        .btn-main.active { background: #2a7de1; color: #fff; cursor: pointer; box-shadow: 0 6px 14px rgba(42,125,225,0.25); }
        .btn-main.active:active { transform: scale(0.97); }
        .btn-main.danger { background: #b13e3e; color: #fff; cursor: pointer; box-shadow: 0 6px 14px rgba(177,62,62,0.25); }
        .btn-main.danger:active { transform: scale(0.97); }
        .status-bar { background: #0f1720; border-radius: 60px; padding: 10px 16px; display: flex; flex-wrap: wrap; justify-content: space-between; font-size: 13px; border: 1px solid #1f2a34; margin-bottom: 12px; color: #9aabb8; }
        .status-bar span { font-weight: 500; color: #dbe1e8; }
        .log-wrap { background: #0b1119; border-radius: 20px; padding: 8px 4px 4px 12px; height: 380px; overflow-y: auto; border: 1px solid #1a232e; display: flex; flex-direction: column-reverse; scroll-behavior: smooth; }
        .log-wrap::-webkit-scrollbar { width: 4px; }
        .log-wrap::-webkit-scrollbar-track { background: #0b1119; }
        .log-wrap::-webkit-scrollbar-thumb { background: #2a3a4a; border-radius: 10px; }
        .log-item { padding: 8px 12px 8px 0; border-bottom: 1px solid #141e28; font-size: 14px; line-height: 1.5; }
        .log-item .age-tag { color: #f5c542; font-weight: 600; margin-right: 8px; }
        .log-item .event-text { color: #dbe1e8; }
        .log-item .event-good { color: #6fcf97; }
        .log-item .event-bad { color: #f28b82; }
        .log-item .event-special { color: #bb86fc; }
        .empty-log { color: #3d4d5e; text-align: center; padding: 40px 0; font-size: 15px; }
        .hidden { display: none; }
        .flex-col { display: flex; flex-direction: column; height: 100%; }
    </style>
</head>
<body>
<div class="app" id="app">
    <!-- 选属性界面 -->
    <div id="setupPanel">
        <div class="title">◈ 人生重开</div>
        <div class="sub">分配你的初始属性</div>
        <div class="pts">剩余点数 <span id="ptsNum">20</span></div>
        <div class="row"><span class="attr-label">颜值</span><button onclick="adj('f',-1)">−</button><span id="fVal">0</span><button onclick="adj('f',1)">+</button></div>
        <div class="row"><span class="attr-label">智力</span><button onclick="adj('i',-1)">−</button><span id="iVal">0</span><button onclick="adj('i',1)">+</button></div>
        <div class="row"><span class="attr-label">体质</span><button onclick="adj('h',-1)">−</button><span id="hVal">0</span><button onclick="adj('h',1)">+</button></div>
        <div class="row"><span class="attr-label">财富</span><button onclick="adj('m',-1)">−</button><span id="mVal">0</span><button onclick="adj('m',1)">+</button></div>
        <button class="btn-main" id="startBtn" disabled>请分配完点数</button>
    </div>

    <!-- 游戏界面 -->
    <div id="gamePanel" class="hidden flex-col">
        <div class="status-bar" id="statusBar">🎂 0岁 · 待出生</div>
        <div class="log-wrap" id="logWrap"><div class="empty-log">点击「下一年」开始人生</div></div>
        <button class="btn-main active" id="nextBtn" onclick="nextYear()">⬇ 下一年</button>
    </div>
</div>
<script>
// ----- 属性 -----
let P = { f:0, i:0, h:0, m:0 };
let rem = 20;
let age = -1;
let alive = true;
let gender = '';

function adj(key, delta) {
    if (!alive) return;
    if (delta > 0 && rem <= 0) return;
    if (delta < 0 && P[key] <= 0) return;
    P[key] += delta;
    rem -= delta;
    document.getElementById('ptsNum').innerText = rem;
    document.getElementById(key.toUpperCase()+'Val').innerText = P[key];
    const btn = document.getElementById('startBtn');
    if (rem === 0) {
        btn.disabled = false;
        btn.className = 'btn-main active';
        btn.innerText = '🎯 开启人生';
        btn.onclick = startGame;
    } else {
        btn.disabled = true;
        btn.className = 'btn-main';
        btn.innerText = '请分配完点数';
        btn.onclick = null;
    }
}

function startGame() {
    gender = Math.random() < 0.5 ? '男' : '女';
    document.getElementById('setupPanel').classList.add('hidden');
    document.getElementById('gamePanel').classList.remove('hidden');
    age = 0;
    alive = true;
    document.getElementById('logWrap').innerHTML = '';
    document.getElementById('nextBtn').innerText = '⬇ 下一年';
    document.getElementById('nextBtn').className = 'btn-main active';
    document.getElementById('nextBtn').onclick = nextYear;
    renderYear(0);
}

// ----- 20种中式随机事件 -----
const EVENTS = [
    // 家庭/亲情
    { text: '你妈打电话来说：你爸住院了，快回来看看。', tag: 'bad', weight: 8 },
    { text: '你妈寄来一箱腊肉，说：外面吃不到家里的味道。', tag: 'good', weight: 6 },
    { text: '你爸喝多了，在电话里说：儿子，爸想你。', tag: 'special', weight: 5 },
    { text: '过年回家，你妈偷偷在你包里塞了两千块钱。', tag: 'good', weight: 7 },
    { text: '你妈在家族群里发了你的照片，配文：我儿子，帅吧。', tag: 'special', weight: 5 },
    // 工作/事业
    { text: '你升职了，工资涨了百分之二十。', tag: 'good', weight: 6 },
    { text: '公司裁员，你被优化了。', tag: 'bad', weight: 7 },
    { text: '你连续加班一周，身体发出警告。', tag: 'bad', weight: 8 },
    { text: '你接了个私单，赚了笔外快。', tag: 'good', weight: 5 },
    { text: '你被猎头挖了，年薪翻倍。', tag: 'good', weight: 4 },
    // 社交/人际
    { text: '同学聚会上，你发现当年不如你的人都混得比你好。', tag: 'bad', weight: 6 },
    { text: '你最好的朋友结婚了，你是伴郎。', tag: 'good', weight: 5 },
    { text: '你在酒局上喝多了，说了不该说的话，得罪了人。', tag: 'bad', weight: 5 },
    { text: '你帮了一个陌生人，后来他成了你的贵人。', tag: 'good', weight: 4 },
    { text: '你被拉进了一个老同学群，里面全是攀比和广告。', tag: 'bad', weight: 5 },
    // 感情/婚姻
    { text: '你被家里安排了三次相亲，一个比一个离谱。', tag: 'bad', weight: 7 },
    { text: '你遇到了一个让你心动的人。', tag: 'good', weight: 5 },
    { text: '你对象说：我们结婚吧。', tag: 'special', weight: 4 },
    { text: '你和对象大吵了一架，冷战了半个月。', tag: 'bad', weight: 6 },
    { text: '你发现你对象背着你跟别人暧昧。', tag: 'bad', weight: 5 },
    // 生活/日常
    { text: '你在路边捡了只流浪猫，带回了家。', tag: 'good', weight: 5 },
    { text: '你搬家了，新房东是个奇葩。', tag: 'bad', weight: 5 },
    { text: '你在二手平台卖了个闲置，对方是个爽快人。', tag: 'good', weight: 4 },
    { text: '你连续失眠了三天。', tag: 'bad', weight: 5 },
    { text: '你突然想通了某件困扰你很久的事。', tag: 'special', weight: 4 },
];

function pickEvents(age) {
    let results = [];
    let count = 1;
    if (age > 20 && age < 40) count = Math.random() < 0.3 ? 2 : 1;
    if (age >= 40 && age < 60) count = Math.random() < 0.4 ? 2 : 1;
    if (age >= 60) count = Math.random() < 0.2 ? 2 : 1;

    // 重要年龄固定事件
    if (age === 6) return [{ text: '你上小学了，背着你妈缝的书包。', tag: 'special' }];
    if (age === 12) return [{ text: '你上初中了，开始长个儿，也开始了叛逆期。', tag: 'special' }];
    if (age === 15) return [{ text: '你上高中了，第一次觉得人生有压力。', tag: 'special' }];
    if (age === 18) {
        if (Math.random() < 0.5) return [{ text: '你高考考上了重点大学，全家都高兴坏了。', tag: 'good' }];
        else return [{ text: '你高考落榜了，你爸抽了一整夜的烟。', tag: 'bad' }];
    }
    if (age === 22) return [{ text: '你大学毕业了，站在校门口，不知道下一步该去哪。', tag: 'special' }];
    if (age === 30) return [{ text: '你三十岁了，回头看，好像什么都没做，又好像什么都做了。', tag: 'special' }];
    if (age === 40) return [{ text: '你四十岁了，开始有了白头发。', tag: 'special' }];
    if (age === 50) return [{ text: '你五十岁了，孩子已经比你高了。', tag: 'special' }];
    if (age === 60) return [{ text: '你六十岁了，退休了。突然不知道该干什么。', tag: 'special' }];

    // 随机抽取
    const pool = EVENTS.slice();
    for (let i = 0; i < count; i++) {
        if (pool.length === 0) break;
        const idx = Math.floor(Math.random() * pool.length);
        results.push(pool[idx]);
        pool.splice(idx, 1);
    }
    return results;
}

// ----- 渲染年份 -----
function renderYear(age) {
    const wrap = document.getElementById('logWrap');
    if (!alive) return;

    // 移除空状态
    const empty = wrap.querySelector('.empty-log');
    if (empty) empty.remove();

    // 状态栏
    const status = document.getElementById('statusBar');
    status.innerHTML = `🧑 ${gender} · ${age}岁 · 财:${P.m} 智:${P.i} 体:${P.h} 颜:${P.f}`;

    // 事件生成
    let events = pickEvents(age);
    let html = '';

    // 0岁特殊处理
    if (age === 0) {
        let desc = `你出生了，性别【${gender}】。`;
        if (P.m >= 8) desc += ' 含着金钥匙出生，家境显赫。';
        else if (P.m >= 5) desc += ' 家境殷实，不愁吃穿。';
        else if (P.m >= 3) desc += ' 普通家庭，比上不足比下有余。';
        else desc += ' 家境贫寒，父母正在为奶粉钱发愁。';

        if (P.f >= 8) desc += ' 你生得漂亮，护士都说没见过这么好看的孩子。';
        else if (P.f >= 5) desc += ' 长得端正，讨人喜欢。';
        else desc += ' 长相普通，扔进人堆就找不着。';

        if (P.i >= 8) desc += ' 你眼睛里透着一股机灵劲儿。';
        else if (P.i >= 5) desc += ' 正常水准，不笨也不聪明。';
        else desc += ' 反应慢半拍，但还算健康。';

        if (P.h >= 8) desc += ' 哭声响亮，壮得像头小牛。';
        else if (P.h >= 5) desc += ' 身体健康，指标正常。';
        else desc += ' 体弱多病，在保温箱里待了好几天。';
        events = [{ text: desc, tag: 'special' }];
    }

    // 构建HTML
    events.forEach(ev => {
        let cls = 'event-text';
        if (ev.tag === 'good') cls = 'event-good';
        else if (ev.tag === 'bad') cls = 'event-bad';
        else if (ev.tag === 'special') cls = 'event-special';
        html += `<div class="log-item"><span class="age-tag">${age}岁</span><span class="${cls}">${ev.text}</span></div>`;
    });

    wrap.innerHTML = html + wrap.innerHTML;

    // 死亡检测
    if (age >= 70 && Math.random() < 0.08) { alive = false; }
    if (age >= 75 && Math.random() < 0.12) { alive = false; }
    if (age >= 80 && Math.random() < 0.18) { alive = false; }
    if (age >= 85 && Math.random() < 0.30) { alive = false; }
    if (age >= 90 && Math.random() < 0.50) { alive = false; }
    if (age >= 95) { alive = false; }

    // 幼年夭折
    if (age <= 10 && P.h <= 2 && Math.random() < 0.25) { alive = false; }

    if (!alive) {
        const deathMsg = age >= 80 ? `你活到了${age}岁，算是高寿了。这一生，有遗憾，也有温暖。` :
                         age >= 70 ? `你活了${age}岁，不算长，但你也尽力了。` :
                         `你${age}岁就离开了，命运对你不太公平。`;
        wrap.innerHTML = `<div class="log-item"><span class="age-tag">${age}岁</span><span class="event-special">${deathMsg}</span></div>` + wrap.innerHTML;
        document.getElementById('nextBtn').innerText = '🔄 重新开局';
        document.getElementById('nextBtn').className = 'btn-main danger';
        document.getElementById('nextBtn').onclick = () => location.reload();
        return;
    }

    // 更新下一年的按钮
    document.getElementById('nextBtn').innerText = '⬇ 下一年';
    document.getElementById('nextBtn').className = 'btn-main active';
    document.getElementById('nextBtn').onclick = nextYear;
}

function nextYear() {
    if (!alive) return;
    age++;
    renderYear(age);
}
</script>
</body>
</html>
