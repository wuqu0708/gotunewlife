<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简RPG</title>
    <style>
        body { background: #111; color: #ccc; font-family: monospace; padding: 15px; font-size: 14px; max-width: 400px; margin: 0 auto; }
        button { background: #222; color: #fff; border: 1px solid #444; padding: 6px 12px; cursor: pointer; margin: 3px; }
        button:disabled { color: #444; border-color: #222; }
        .row { display: flex; justify-content: space-between; margin: 5px 0; border-bottom: 1px dashed #333; }
        #log { height: 120px; overflow-y: auto; background: #000; padding: 5px; margin-top: 10px; font-size: 12px; }
        .hide { display: none; }
    </style>
</head>
<body>
    <div id="setup">
        <h3>属性分配 (剩余: <span id="pts">20</span>)</h3>
        <div class="row"><span>暴击(颜)</span><div><button onclick="adj('f',-1)">-</button><span id="f">0</span><button onclick="adj('f',1)">+</button></div></div>
        <div class="row"><span>技能(智)</span><div><button onclick="adj('i',-1)">-</button><span id="i">0</span><button onclick="adj('i',1)">+</button></div></div>
        <div class="row"><span>生命(体)</span><div><button onclick="adj('h',-1)">-</button><span id="h">0</span><button onclick="adj('h',1)">+</button></div></div>
        <button id="go" onclick="start()" disabled style="width:100%">进入深渊</button>
    </div>

    <div id="game" class="hide">
        <div class="row"><b>Lv.<span id="lv">1</span> (第 <span id="fl">1</span> 层)</b> <span>金币: <span id="gd">0</span></span></div>
        <div class="row"><span>自身生命:</span> <b id="php">100/100</b></div>
        <div class="row"><span>当前怪: <b id="mname">-</b></span> <b id="mhp" style="color:red">0/0</b></div>
        <div class="row">
            <span>装备(点字替换):</span>
            <span id="eqw" onclick="eq('w')" style="color:#5294e2;cursor:pointer">徒手</span> | 
            <span id="eqa" onclick="eq('a')" style="color:#a3be8c;cursor:pointer">布衣</span>
        </div>
        <div style="margin-top:10px;">
            <button onclick="action(0)">普通攻击</button>
            <button id="sk" onclick="action(1)">重击(CD:0)</button>
        </div>
        <div id="log"></div>
    </div>

    <script>
        let attr = { f:0, i:0, h:0 }, rem = 20, fl = 1, cd = 0;
        let p = { lv:1, hp:100, max:100, exp:0, atk:10, eatk:0, ehp:0, gd:0 }, m = {}, loot = null;

        function adj(k, d) {
            if ((rem <= 0 && d > 0) || (attr[k] + d < 0)) return;
            attr[k] += d; rem -= d;
            document.getElementById('pts').textContent = rem;
            document.getElementById(k).textContent = attr[k];
            document.getElementById('go').disabled = rem !== 0;
        }

        function start() {
            p.max = 100 + attr.h * 15; p.hp = p.max;
            document.getElementById('setup').classList.add('hide');
            document.getElementById('game').classList.remove('hide');
            msg("➔ 你踏入了深渊..."); spawn();
        }

        function spawn() {
            m = { name: ["虚空","远古","变异"][Math.min(2, Math.floor(fl/4))] + ["史莱姆","爬虫","守卫"][Math.floor(Math.random()*3)], hp: 20+fl*12, max: 20+fl*12, atk: 3+fl*2 };
            if(cd > 0) cd--; update();
        }

        function action(isSkill) {
            let dmg = p.atk + p.eatk + Math.floor(Math.random()*5);
            if (isSkill) { dmg = Math.floor(dmg * 1.7) + attr.i * 3; cd = 3; msg(`🔮 技能重击！造成 ${dmg} 点伤`); } 
            else {
                let crit = Math.random()*100 < (5 + attr.f*2);
                if(crit) { dmg = Math.floor(dmg*1.5); msg(`💥 暴击！造成 ${dmg} 点伤`); }
                else msg(`⚔️ 你造成了 ${dmg} 点伤`);
            }
            m.hp -= dmg;
            if (m.hp <= 0) {
                p.exp += 20 + fl*5; p.gd += 10 + fl*3; msg(`🏆 斩杀 ${m.name}！金币+${10+fl*3}`);
                if (Math.random() < 0.4) {
                    let isW = Math.random() < 0.5, v = Math.floor(fl * 1.5 * (Math.random()>0.8?2.5:1));
                    loot = { type: isW?'w':'a', val: isW?v:v*6, name: (isW?'武器+':'防具+削')+v };
                    msg(`🎁 掉落了 [${loot.name}]，<b style="color:yellow">点击上方装备栏字样</b> 可替换装备`);
                    document.getElementById(isW?'eqw':'eqa').textContent = loot.name + "(待装)";
                }
                if (p.exp >= p.lv*40) { p.lv++; p.atk+=3; msg(`✨ 升级！攻击永久+3`); }
                fl++; p.hp = Math.min(p.max+p.ehp, p.hp + Math.floor((p.max+p.ehp)*0.15));
                spawn(); return;
            }
            let mdmg = m.atk + Math.floor(Math.random()*3); p.hp -= mdmg; msg(`👹 怪物反击，你受到 ${mdmg} 点伤`);
            if (p.hp <= 0) { msg(`<b style="color:red">💥 游戏结束！你死在第 ${fl} 层</b>`); document.querySelectorAll("button").forEach(b=>b.disabled=true); }
            update();
        }

        function eq(t) {
            if (!loot || loot.type !== t) return;
            if (t === 'w') { p.eatk = loot.val; document.getElementById('eqw').textContent = loot.name; }
            else { p.ehp = loot.val; document.getElementById('eqa').textContent = loot.name; }
            msg(`裝备成功！属性已飙升`); loot = null; update();
        }

        function msg(txt) {
            let l = document.getElementById('log'); l.innerHTML += `<div>${txt}</div>`; l.scrollTop = l.scrollHeight;
        }

        function update() {
            document.getElementById('lv').textContent = p.lv; document.getElementById('fl').textContent = fl; document.getElementById('gd').textContent = p.gd;
            document.getElementById('php').textContent = `${p.hp}/${p.max+p.ehp}`;
            document.getElementById('mname').textContent = m.name; document.getElementById('mhp').textContent = `${m.hp}/${m.max}`;
            document.getElementById('sk').disabled = cd > 0; document.getElementById('sk').textContent = `重击(CD:${cd})`;
        }
    </script>
</body>
</html>
