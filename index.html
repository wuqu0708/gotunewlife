<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人生重开 - 家庭副本</title>
    <style>
        body { margin: 0; padding: 15px; background: #121212; color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        button { background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 8px; font-size: 16px; margin: 5px 0; cursor: pointer; }
        button:hover { background: #3a3a3a; }
        .row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
        #log { flex: 1; overflow-y: auto; background: #1a1a1a; padding: 12px; border-radius: 8px; margin: 10px 0; font-size: 14px; line-height: 1.8; border: 1px solid #2a2a2a; }
        #log p { margin: 4px 0; padding: 4px 0; border-bottom: 1px solid #1a1a1a; }
        #p1 { display: flex; flex-direction: column; height: 100%; overflow-y: auto; }
        #p2 { display: none; flex-direction: column; height: 100%; }
        #status { text-align:center; font-size: 13px; padding: 8px; background:#1a1a1a; border-radius:6px; border:1px solid #2a2a2a; }
        hr { border: 0; border-top: 1px solid #2a2a2a; margin: 12px 0; }
        .highlight { color: #ff6b6b; }
        .highlight-gold { color: #ffd700; }

        .card { background: #1a1a2e; border: 2px solid #333; border-radius: 16px; padding: 24px 16px; margin: 10px 0; text-align: center; transition: 0.3s; }
        .card.revealed { border-color: #4fc3f7; }
        .card .name { font-size: 22px; font-weight: bold; margin: 6px 0; }
        .card .desc { font-size: 13px; color: #aaa; margin: 6px 0; }
        .card .debuff { font-size: 12px; color: #ff6b6b; margin-top: 6px; }

        .btn-draw { background: #1a237e; border-color: #3949ab; font-size: 18px; padding: 14px; font-weight: bold; }
        .btn-draw:hover { background: #283593; }

        .btn-enter { background: #0d47a1; border-color: #1976d2; display: none; }
        .btn-enter:hover { background: #1565c0; }

        .attr-label { display: inline-block; width: 40px; }
    </style>
</head>
<body>

<!-- ========== 第一屏：抽副本 ========== -->
<div id="p1">
    <h2 style="text-align:center; margin-bottom: 4px;">抽取你的原生家庭</h2>
    <p style="text-align:center; color:#888; font-size:13px; margin-top:0;">每次开局随机获得一个家庭剧本</p>

    <div class="card" id="cardDisplay">
        <div style="font-size:48px; opacity:0.2; margin:10px 0;">?</div>
        <div style="color:#666; font-size:14px;">点击下方按钮抽取</div>
    </div>

    <button class="btn-draw" id="drawBtn" onclick="drawCard()">抽取家庭</button>
    <button class="btn-enter" id="enterBtn" onclick="enterGame()">进入人生</button>
</div>

<!-- ========== 第二屏：游戏 ========== -->
<div id="p2">
    <div id="status"></div>
    <div id="log"></div>
    <button id="btn" onclick="next()">下一年</button>
</div>

// ========== 游戏状态 ==========
let currentCopy = null;
let p = { f:0, i:0, h:0, money:0 };
let rem = 20;
let age = -1;
let alive = true;
let gender = "";
let gameStarted = false;

// ========== 抽卡逻辑 ==========
function drawCard() {
    const idx = Math.floor(Math.random() * FAMILY_COPIES.length);
    currentCopy = FAMILY_COPIES[idx];

    const card = document.getElementById('cardDisplay');
    card.className = 'card revealed';
    card.innerHTML = `
        <div class="name">${currentCopy.name}</div>
        <div class="desc">${currentCopy.desc}</div>
        <div class="debuff">负面效果：${currentCopy.debuff}</div>
    `;

    document.getElementById('enterBtn').style.display = 'block';
}

// ========== 进入游戏 ==========
function enterGame() {
    if (!currentCopy) return;

    p = { f:0, i:0, h:0, money:0 };
    rem = 20;
    age = -1;
    alive = true;
    gender = Math.random() < 0.5 ? '男' : '女';
    gameStarted = false;

    document.getElementById('p1').innerHTML = `
        <h3 style="text-align:center;">家庭：${currentCopy.name}</h3>
        <div style="text-align:center; font-size:13px; color:#888; margin-bottom:6px;">${currentCopy.desc}</div>
        <div style="text-align:center; font-size:12px; color:#ff6b6b; margin-bottom:12px;">负面效果：${currentCopy.debuff}</div>
        <hr>
        <h3 style="text-align:center;">属性分配 (剩余: <span id="pts">20</span>)</h3>
        <div class="row"><span class="attr-label">颜值</span><button onclick="add('f',-1)">-</button><span id="f">0</span><button onclick="add('f',1)">+</button></div>
        <div class="row"><span class="attr-label">智力</span><button onclick="add('i',-1)">-</button><span id="i">0</span><button onclick="add('i',1)">+</button></div>
        <div class="row"><span class="attr-label">体质</span><button onclick="add('h',-1)">-</button><span id="h">0</span><button onclick="add('h',1)">+</button></div>
        <div class="row"><span class="attr-label">财富</span><button onclick="add('money',-1)">-</button><span id="money">0</span><button onclick="add('money',1)">+</button></div>
        <button id="go" onclick="startGame()" style="background:#444;" disabled>请分完点数</button>
    `;

    window.add = function(t, v) {
        if ((v > 0 && rem <= 0) || (v < 0 && p[t] <= 0)) return;
        p[t] += v; rem -= v;
        document.getElementById('pts').innerText = rem;
        document.getElementById(t).innerText = p[t];
        const btn = document.getElementById('go');
        btn.disabled = rem !== 0;
        btn.style.background = rem === 0 ? "#0d47a1" : "#444";
        btn.innerText = rem === 0 ? "开始人生" : "请分完点数";
    };

    window.startGame = function() {
        gameStarted = true;
        document.getElementById('p1').style.display = 'none';
        document.getElementById('p2').style.display = 'flex';
        document.getElementById('log').innerHTML = '';
        document.getElementById('btn').style.background = '#2a2a2a';
        document.getElementById('btn').innerText = '下一年';
        document.getElementById('btn').onclick = next;
        next();
    };
}

// ========== 游戏主循环 ==========
function next() {
    const log = document.getElementById('log');
    const btn = document.getElementById('btn');

    if (!alive) {
        btn.innerText = '重新投胎';
        btn.onclick = function() { location.reload(); };
        return;
    }

    age++;

    // ===== 生老病死自然结局 =====
    if (age > 70) {
        const deathRoll = Math.random();
        if (age > 90 || (age > 75 && deathRoll < 0.15) || (age > 80 && deathRoll < 0.3) || (age > 85 && deathRoll < 0.5)) {
            alive = false;
            let deathMsg = '你安详地离开了这个世界。';
            if (age > 90) deathMsg = '你活了' + age + '岁，是高寿。你走的时候，子孙都在身边。';
            else if (age > 80) deathMsg = '你活了' + age + '岁。你走得很平静，没什么痛苦。';
            else deathMsg = '你活了' + age + '岁。虽然不算太长，但你也尽力了。';
            log.innerHTML = '<p style="color:#ffd700;"><b>【' + age + '岁】</b><br>' + deathMsg + '</p>' + log.innerHTML;
            log.innerHTML += '<p style="color:#888; margin-top:12px;">' + currentCopy.ending + '</p>';
            btn.innerText = '重新投胎';
            btn.style.background = '#b71c1c';
            btn.onclick = function() { location.reload(); };
            return;
        }
    }

    // ===== 夭折判定（幼年体质太差） =====
    if (age >= 1 && age <= 10 && p.h <= 2 && Math.random() < 0.2) {
        alive = false;
        log.innerHTML = '<p style="color:red;">【' + age + '岁】你因体质太差，生病夭折了。游戏结束。</p>' + log.innerHTML;
        btn.innerText = '重新投胎';
        btn.style.background = '#b71c1c';
        btn.onclick = function() { location.reload(); };
        return;
    }

    // ===== 生成事件文本 =====
    let txt = '';

    if (age === 0) {
        let mText = "";
        if (p.money >= 8) mText = "你出生在大富大贵之家，住着别墅，保姆环绕。";
        else if (p.money >= 5) mText = "你出生在一个富裕的中产家庭，生活无忧无虑。";
        else if (p.money >= 3) mText = "你出生在一个普通的工薪家庭，父母工作稳定。";
        else mText = "你出生在清贫的破旧平房里，父母正在为房租发愁。";

        let fText = p.f >= 8 ? "接生护士惊呼这孩子太漂亮了。" : (p.f >= 4 ? "白白净净，挺可爱的。" : "长相普通，扔进人堆找不到。");
        let iText = p.i >= 8 ? "眼神里闪着智慧的光。" : (p.i >= 4 ? "正常水准的聪明宝宝。" : "眼神呆滞，只知道啃手指。");
        let hText = p.h >= 8 ? "哭声响彻医院，壮得像头小牛。" : (p.h >= 4 ? "身体指标健康。" : "出生就进了保温箱，体质虚弱。");

        txt = currentCopy.birth + '<br>【财富】' + mText + '<br>【长相】' + fText + '<br>【智力】' + iText + '<br>【体质】' + hText + '<br>【性别】' + gender;
    }
    else if (age >= 1 && age <= 5) {
        const events = [
            '一岁了，你学会了爬。你爸妈在旁边看着你笑。',
            '两岁了，你学会了说话。你说的第一个词是"妈"。',
            '三岁了，你被送去了幼儿园。你哭着不想去。',
            '四岁了，你在幼儿园交到了第一个朋友。',
            '五岁了，你开始认字了。你妈很得意。'
        ];
        txt = events[age - 1] || '你慢慢长大了。';
    }
    else if (currentCopy.events && currentCopy.events[age]) {
        txt = currentCopy.events[age];
    }
    else if (age === 6) {
        txt = '六岁了，你上小学了。你背着新书包，觉得世界很大。';
    }
    else if (age === 12) {
        txt = '十二岁了，你上初中了。你开始发现，人和人是不一样的。';
    }
    else if (age === 15) {
        txt = '十五岁了，你上高中了。你第一次认真想：我以后想成为什么样的人？';
    }
    else if (age === 18) {
        const roll = Math.random();
        if (roll < 0.3) txt = '十八岁，高考出分了。你考砸了。你觉得自己让所有人失望了。';
        else if (roll < 0.7) txt = '十八岁，高考出分了。你考了个普通大学。不算好，也不算太差。';
        else txt = '十八岁，高考出分了。你考上了重点大学！你第一次觉得自己挺厉害的。';
    }
    else if (age === 22) {
        txt = '二十二岁，大学毕业了。你站在人生的十字路口，不知道该往哪走。';
    }
    else if (age === 25) {
        txt = '二十五岁，你开始被催婚。你妈说：你看看那谁家孩子都二胎了。';
    }
    else if (age === 30) {
        txt = '三十岁了。你回头看了看走过的路，笑了笑，继续往前走。';
    }
    else if (age % 5 === 0 && age > 30) {
        txt = age + '岁了。日子过得很快，你开始珍惜每一天。';
    }
    else if (age > 30) {
        txt = '你 ' + age + ' 岁了，平静地度过了一年。';
    }
    else {
        txt = '你 ' + age + ' 岁了。';
    }

    // 更新状态栏
    document.getElementById('status').innerHTML = 
        '家庭: ' + currentCopy.name + ' | ' + gender + 
        ' | 财:' + p.money + ' 智:' + p.i + ' 体:' + p.h + ' 颜:' + p.f;

    log.innerHTML = '<p><b>【' + age + '岁】</b><br>' + txt + '</p>' + log.innerHTML;
    btn.innerText = '下一年';
}
</script>
</body>
</html>
